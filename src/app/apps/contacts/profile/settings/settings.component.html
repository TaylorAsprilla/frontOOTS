<form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
  <!-- Alert de éxito -->
  <div class="alert alert-success alert-dismissible fade show" role="alert" *ngIf="successMessage">
    <i class="mdi mdi-check-circle me-2"></i>
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''"></button>
  </div>

  <!-- Alert de error -->
  <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="errorMessage">
    <i class="mdi mdi-alert-circle me-2"></i>
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="mb-3">
        <label for="firstname" class="form-label"
          >{{ 'profile.firstName' | transloco }} <span class="text-danger">*</span></label
        >
        <input
          type="text"
          class="form-control"
          id="firstname"
          [placeholder]="'profile.firstNamePlaceholder' | transloco"
          required
          formControlName="firstName"
          [class.is-invalid]="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched"
        />
        <div
          class="invalid-feedback"
          *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched"
        >
          {{ 'profile.firstNameRequired' | transloco }}
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3">
        <label for="lastname" class="form-label"
          >{{ 'profile.lastName' | transloco }} <span class="text-danger">*</span></label
        >
        <input
          type="text"
          class="form-control"
          id="lastname"
          [placeholder]="'profile.lastNamePlaceholder' | transloco"
          required
          formControlName="lastName"
          [class.is-invalid]="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched"
        />
        <div
          class="invalid-feedback"
          *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched"
        >
          {{ 'profile.lastNameRequired' | transloco }}
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="mb-3">
        <label for="phoneNumber" class="form-label">{{ 'profile.phoneNumber' | transloco }}</label>
        <input
          type="text"
          class="form-control"
          id="phoneNumber"
          [placeholder]="'profile.phoneNumberPlaceholder' | transloco"
          formControlName="phoneNumber"
        />
      </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3">
        <label for="position" class="form-label">{{ 'profile.position' | transloco }}</label>
        <input
          type="text"
          class="form-control"
          id="position"
          [placeholder]="'profile.positionPlaceholder' | transloco"
          formControlName="position"
        />
      </div>
    </div>
  </div>

  <div class="text-end">
    <button
      type="submit"
      class="btn btn-success waves-effect waves-light mt-2"
      [disabled]="profileForm.invalid || isLoading"
    >
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
      <i class="mdi mdi-content-save" *ngIf="!isLoading"></i>
      {{ (isLoading ? 'profile.saving' : 'profile.saveChanges') | transloco }}
    </button>
  </div>
</form>
