<div class="family-table-wrapper">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h6 class="mb-1">Composición familiar</h6>
      <p class="text-muted small mb-0">Agrega integrantes relacionados al caso cuando sea necesario.</p>
    </div>

    <button type="button" class="btn btn-outline-primary btn-sm" (click)="addMember.emit()" [disabled]="readOnly">
      <i class="mdi mdi-plus me-1"></i>
      Agregar familiar
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-sm align-middle mb-0">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Edad</th>
          <th>Parentesco</th>
          <th>Ocupación</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let member of familyMembers.controls; let index = index; trackBy: trackByIndex"
          [formGroup]="member"
        >
          <td>
            <input
              type="text"
              class="form-control"
              formControlName="name"
              placeholder="Nombre completo"
              [readonly]="readOnly"
            />
            <div class="invalid-feedback d-block" *ngIf="hasRowError(index, 'name')">El nombre es requerido.</div>
          </td>
          <td>
            <input
              type="number"
              class="form-control"
              formControlName="age"
              min="0"
              placeholder="Edad"
              [readonly]="readOnly"
            />
          </td>
          <td>
            <input
              type="text"
              class="form-control"
              formControlName="relationship"
              placeholder="Parentesco"
              [readonly]="readOnly"
            />
            <div class="invalid-feedback d-block" *ngIf="hasRowError(index, 'relationship')">
              El parentesco es requerido.
            </div>
          </td>
          <td>
            <input
              type="text"
              class="form-control"
              formControlName="occupation"
              placeholder="Ocupación"
              [readonly]="readOnly"
            />
          </td>
          <td class="text-end">
            <button
              type="button"
              class="btn btn-outline-danger btn-sm"
              (click)="removeMember.emit(index)"
              [disabled]="readOnly"
            >
              <i class="mdi mdi-delete-outline"></i>
            </button>
          </td>
        </tr>

        <tr *ngIf="!familyMembers.length">
          <td colspan="5" class="text-center py-4 text-muted">No se han agregado familiares a la discusión.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
