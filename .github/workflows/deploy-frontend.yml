name: Deploy Frontend OOTS to CloudFront

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  S3_BUCKET: oots-prod-frontend
  CLOUDFRONT_DISTRIBUTION_ID: EDYEHFY6FQWXL
  BUILD_OUTPUT: dist/oots-pr

jobs:
  deploy:
    name: Build and deploy Angular frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::946849521045:role/OOTS-GitHubActions-Frontend-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Angular production
        run: npm run build:pr

      - name: Validate build output
        run: |
          ls -la $BUILD_OUTPUT
          test -f $BUILD_OUTPUT/index.html

      - name: Upload Angular build to S3
        run: |
          aws s3 sync "$BUILD_OUTPUT" s3://$S3_BUCKET --delete

      - name: Set no-cache for index.html
        run: |
          aws s3 cp "$BUILD_OUTPUT/index.html" s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
